name: Help / Question
description: Ask for help using Devonz or understanding a feature
title: "[Question]: "
labels: ["question", "help"]
body:
  - type: markdown
    attributes:
      value: |
        ## Help / Question

        Need help with Devonz? Ask here. No question is too basic.

        **Before asking**, please check:
        - [README](https://github.com/zebbern/Devonz) — Setup and configuration
        - [Documentation](https://github.com/zebbern/Devonz/tree/main/docs) — Guides and reference
        - [Existing issues](https://github.com/zebbern/Devonz/issues?q=is%3Aissue+label%3Aquestion) — Someone may have asked already

  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
      description: |
        Describe what you're trying to do and where you're stuck.
      placeholder: |
        I'm trying to connect my Ollama instance to Devonz, but the models
        don't appear in the provider dropdown even though Ollama is running locally...
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: |
        What steps have you taken or documentation have you read?
      placeholder: |
        I've tried:
        1. Setting OLLAMA_BASE_URL=http://127.0.0.1:11434 in .env.local
        2. Restarting the dev server with pnpm dev
        3. Checking Settings → Providers tab
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Relevant output (if any)
      description: |
        If you're getting errors, paste the output here (browser console, terminal, etc).
      render: shell
    validations:
      required: false

  - type: dropdown
    id: topic
    attributes:
      label: Topic area
      description: What area is your question about?
      options:
        - "Installation and setup"
        - "Docker deployment"
        - "AI provider configuration"
        - "Code generation / chat"
        - "Code editor"
        - "Terminal usage"
        - "Live preview"
        - "Deployment (GitHub, GitLab, Netlify, Vercel)"
        - "MCP tool integration"
        - "Template gallery"
        - "Git integration"
        - "Environment variables / .env"
        - "Performance / resource usage"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Your environment
      description: |
        Please provide your setup details:
        - Node.js version (`node --version`)
        - pnpm version (`pnpm --version`)
        - OS and browser
        - Running via Docker or from source
      render: shell
    validations:
      required: false

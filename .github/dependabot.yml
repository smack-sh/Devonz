version: 2

updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore(deps):"
    groups:
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
          - "ollama-ai-provider"
          - "@openrouter/*"
        update-types:
          - "minor"
          - "patch"
      codemirror:
        patterns:
          - "@codemirror/*"
          - "@lezer/*"
          - "@uiw/codemirror-*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      remix:
        patterns:
          - "@remix-run/*"
          - "remix-*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
      dev-tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript"
          - "husky"
          - "lint-staged"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"
